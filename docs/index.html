<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Monitor</title>
<style>
  :root {
    color-scheme: light dark;
    --green: #1b8a4b;
    --red: #c0392b;
    --gray: #888;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 16px;
    max-width: 480px;
    margin-inline: auto;
  }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  #updated { color: var(--gray); font-size: 0.85rem; margin-bottom: 16px; }
  .card {
    border: 1px solid rgba(128,128,128,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .name { font-weight: 600; }
  .ticker { color: var(--gray); font-size: 0.8rem; }
  .price { text-align: right; }
  .delta { font-weight: 600; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .trend-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 6px;
    margin-top: 4px;
  }
  .trend-up { background: rgba(27,138,75,0.15); color: var(--green); }
  .trend-down { background: rgba(192,57,43,0.15); color: var(--red); }
  #empty { color: var(--gray); }
</style>
</head>
<body>
  <h1>Stock Monitor</h1>
  <div id="updated">Caricamento...</div>
  <div id="list"></div>

  <script>
    fetch("./state.json?_=" + Date.now())
      .then(r => r.json())
      .then(render)
      .catch(() => {
        document.getElementById("updated").textContent = "Errore nel caricamento di state.json";
      });

    function render(state) {
      const updatedEl = document.getElementById("updated");
      updatedEl.textContent = state.last_updated
        ? "Ultimo aggiornamento: " + new Date(state.last_updated).toLocaleString("it-IT")
        : "Nessun aggiornamento ancora eseguito";

      const list = document.getElementById("list");
      const stocks = Object.entries(state.stocks || {});
      if (stocks.length === 0) {
        list.innerHTML = '<div id="empty">Nessun dato disponibile.</div>';
        return;
      }

      list.innerHTML = stocks.map(([ticker, s]) => {
        const deltaClass = s.delta_pct >= 0 ? "up" : "down";
        const deltaSign = s.delta_pct >= 0 ? "+" : "";
        let trendTag = "";
        if (s.last_trend_signal === "up") {
          trendTag = '<span class="trend-tag trend-up">trend rialzista</span>';
        } else if (s.last_trend_signal === "down") {
          trendTag = '<span class="trend-tag trend-down">trend ribassista</span>';
        }
        return `
          <div class="card">
            <div>
              <div class="name">${s.name || ticker}</div>
              <div class="ticker">${ticker}</div>
              ${trendTag}
            </div>
            <div class="price">
              <div>${(s.last_price ?? "-")}</div>
              <div class="delta ${deltaClass}">${deltaSign}${(s.delta_pct ?? 0).toFixed(2)}%</div>
            </div>
          </div>
        `;
      }).join("");
    }
  </script>
</body>
</html>
